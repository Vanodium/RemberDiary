# Render Blueprint — deploy from the Render dashboard via "New > Blueprint"
# and point it at this repo (main branch recommended).
#
# Render does NOT offer managed MySQL (only PostgreSQL). You must host MySQL
# elsewhere and set the MYSQL_* env vars on rember-api after deploy.
#
# Recommended external MySQL: Aiven free tier (SSL required — set MYSQL_CA_CERT).
# In Aiven: Service settings → IP allowlist → add Render outbound IPs
# (Render dashboard → rember-api → Connect → Outbound IPs).
#
# After deploy, set MYSQL_* on the API service.
# Render free tier blocks SMTP (ports 25/465/587) — use Brevo over HTTPS:
# BREVO_API_KEY, EMAIL_FROM (sender must be verified in Brevo).
# Transcription + summaries on free tier: GROQ_API_KEY from console.groq.com/keys.

services:
  - type: web
    name: rember-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_CA_CERT
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GROQ_API_KEY
        sync: false
