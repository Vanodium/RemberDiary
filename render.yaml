# Render Blueprint — deploy from the Render dashboard via "New > Blueprint"
# and point it at this repo (main branch recommended).
#
# Render does NOT offer managed MySQL (only PostgreSQL). You must host MySQL
# elsewhere and set the MYSQL_* env vars on rember-api after deploy.
#
# Recommended external MySQL: Aiven free tier (SSL required — set MYSQL_CA_CERT).
# In Aiven: Service settings → IP allowlist → add Render outbound IPs
# (Render dashboard → rember-api → Connect → Outbound IPs).
#
# After deploy, set MYSQL_* and SMTP_* / EMAIL_FROM on the API service.

services:
  - type: web
    name: rember-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_CA_CERT
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "0"
      - key: EMAIL_FROM
        sync: false
