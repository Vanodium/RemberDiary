services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rember
      MYSQL_USER: rember
      MYSQL_PASSWORD: rember
    volumes:
      - rember_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-urember", "-prember"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rember_mysql_data:
